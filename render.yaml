services:
  - type: web
    name: hostelmate-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run prisma:generate && npm run migrate
    startCommand: cd backend && npm start
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hostelmate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ap-endsem.vercel.app

databases:
  - name: hostelmate-db
    databaseName: hostelmate
    user: hostelmate
    plan: free
