services:
  - type: web
    name: hostelmate-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run prisma:generate && npm run migrate
    startCommand: cd backend && npm start
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ap-endsem.vercel.app
